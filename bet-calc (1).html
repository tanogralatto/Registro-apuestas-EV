<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BET.CALC</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161922;
    --surface2: #1e2330;
    --border: #2a3045;
    --accent: #c8f135;
    --red: #ff4d6a;
    --green: #c8f135;
    --yellow: #f1c135;
    --text: #e8ecf5;
    --muted: #6b7a99;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    padding: 0 0 60px 0;
  }

  /* HEADER */
  .header {
    padding: 28px 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 38px;
    letter-spacing: 2px;
    line-height: 1;
  }
  .header h1 span { color: var(--accent); }
  .header p {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    margin-top: 4px;
    text-transform: uppercase;
  }

  /* STATS GRID */
  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    margin: 20px 20px 0;
    border-radius: 14px;
    overflow: hidden;
  }
  .stat {
    background: var(--surface);
    padding: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .stat-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 1px;
    line-height: 1;
  }
  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }
  .green { color: var(--green); }
  .red   { color: var(--red); }
  .yellow { color: var(--yellow); }

  /* FORM */
  .form-wrap {
    margin: 20px 20px 0;
    background: var(--surface);
    border-radius: 14px;
    border: 1px solid var(--border);
    padding: 18px;
  }
  .form-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .form-row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
  }
  .input-group {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .input-group label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }
  input[type="number"], input[type="text"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  input[type="number"]:focus, input[type="text"]:focus {
    border-color: var(--accent);
  }
  .preview {
    background: var(--surface2);
    border-radius: 8px;
    padding: 10px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
  }
  .preview span { color: var(--accent); font-size: 14px; }

  /* RESULTADO BUTTONS */
  .result-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .btn-result {
    flex: 1;
    padding: 11px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-result.selected-win {
    background: rgba(200, 241, 53, 0.12);
    border-color: var(--green);
    color: var(--green);
  }
  .btn-result.selected-loss {
    background: rgba(255, 77, 106, 0.12);
    border-color: var(--red);
    color: var(--red);
  }
  .btn-result.selected-pending {
    background: rgba(241, 193, 53, 0.12);
    border-color: var(--yellow);
    color: var(--yellow);
  }

  .btn-add {
    width: 100%;
    padding: 13px;
    border-radius: 8px;
    border: none;
    background: var(--accent);
    color: #0d0f14;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn-add:active { transform: scale(0.98); opacity: 0.85; }

  /* HISTORIAL */
  .history-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 24px 20px 12px;
  }
  .history-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
  }
  .filter-tabs {
    display: flex;
    gap: 6px;
    margin: 0 20px 14px;
    overflow-x: auto;
    padding-bottom: 2px;
    scrollbar-width: none;
  }
  .filter-tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tab.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(200, 241, 53, 0.08);
  }

  /* BET CARDS */
  .bets-list {
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .bet-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .bet-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-win     { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot-loss    { background: var(--red);   box-shadow: 0 0 6px var(--red); }
  .dot-pending { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }

  .bet-info { flex: 1; min-width: 0; }
  .bet-desc {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
    margin-bottom: 3px;
  }
  .bet-meta {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  .bet-amount {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }

  .bet-actions {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex-shrink: 0;
  }
  .btn-icon {
    width: 30px;
    height: 30px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    transition: all 0.15s;
  }
  .btn-icon:hover { border-color: var(--accent); color: var(--accent); }
  .btn-icon.del:hover { border-color: var(--red); color: var(--red); }

  .empty {
    text-align: center;
    padding: 40px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* MODAL DE EDICIÓN */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    border: 1px solid var(--border);
    border-bottom: none;
    padding: 24px 20px 40px;
    width: 100%;
    max-width: 480px;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  .modal-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-close {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
  }
  .btn-save {
    width: 100%;
    padding: 13px;
    border-radius: 8px;
    border: none;
    background: var(--accent);
    color: #0d0f14;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    cursor: pointer;
    margin-top: 12px;
  }

  /* FOOTER */
  .footer {
    text-align: center;
    margin-top: 30px;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: #2a3045;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="header">
  <h1>BET<span>.</span>CALC</h1>
  <p>Calculadora de apuestas</p>
</div>

<!-- STATS -->
<div class="stats">
  <div class="stat">
    <div class="stat-val" id="s-total">0</div>
    <div class="stat-label">Apuestas</div>
  </div>
  <div class="stat">
    <div class="stat-val green" id="s-won">0</div>
    <div class="stat-label">Ganadas</div>
  </div>
  <div class="stat">
    <div class="stat-val red" id="s-lost">0</div>
    <div class="stat-label">Perdidas</div>
  </div>
  <div class="stat">
    <div class="stat-val" id="s-pnl">$0</div>
    <div class="stat-label">P&L Neto</div>
  </div>
</div>

<!-- FORMULARIO -->
<div class="form-wrap">
  <div class="form-title">✦ Nueva apuesta</div>

  <div class="form-row">
    <div class="input-group">
      <label>Descripción (opcional)</label>
      <input type="text" id="f-desc" placeholder="Ej: River gana">
    </div>
  </div>

  <div class="form-row">
    <div class="input-group">
      <label>Stake ($)</label>
      <input type="text" id="f-stake" placeholder="0" inputmode="decimal" autocomplete="off">
    </div>
    <div class="input-group">
      <label>Cuota</label>
      <input type="text" id="f-odds" placeholder="1.00" inputmode="decimal" autocomplete="off">
    </div>
  </div>

  <div class="preview">
    <span>Retorno potencial</span>
    <span id="f-preview">$0.00</span>
  </div>

  <div class="result-row">
    <button class="btn-result selected-win" id="btn-win" onclick="selectResult('win')">✓ Ganada</button>
    <button class="btn-result" id="btn-loss" onclick="selectResult('loss')">✗ Perdida</button>
    <button class="btn-result" id="btn-pending" onclick="selectResult('pending')">⏳ Pendiente</button>
  </div>

  <button class="btn-add" onclick="addBet()">+ AGREGAR APUESTA</button>
</div>

<!-- HISTORIAL -->
<div class="history-header">
  <span class="history-title">Historial</span>
</div>

<div class="filter-tabs">
  <button class="tab active" onclick="setFilter('all', this)">Todas</button>
  <button class="tab" onclick="setFilter('pending', this)">Pendientes</button>
  <button class="tab" onclick="setFilter('win', this)">Ganadas</button>
  <button class="tab" onclick="setFilter('loss', this)">Perdidas</button>
</div>

<div class="bets-list" id="bets-list"></div>

<!-- MODAL EDICIÓN -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">
      <span>✦ Editar apuesta</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <div class="form-row">
      <div class="input-group">
        <label>Descripción</label>
        <input type="text" id="e-desc" placeholder="Ej: River gana">
      </div>
    </div>
    <div class="form-row">
      <div class="input-group">
        <label>Stake ($)</label>
        <input type="text" id="e-stake" inputmode="decimal" autocomplete="off">
      </div>
      <div class="input-group">
        <label>Cuota</label>
        <input type="text" id="e-odds" inputmode="decimal" autocomplete="off">
      </div>
    </div>

    <div class="result-row">
      <button class="btn-result" id="e-btn-win" onclick="selectEditResult('win')">✓ Ganada</button>
      <button class="btn-result" id="e-btn-loss" onclick="selectEditResult('loss')">✗ Perdida</button>
      <button class="btn-result" id="e-btn-pending" onclick="selectEditResult('pending')">⏳ Pendiente</button>
    </div>

    <button class="btn-save" onclick="saveEdit()">GUARDAR CAMBIOS</button>
  </div>
</div>

<div class="footer">tanogralatto.github.io</div>

<script>
  let bets = JSON.parse(localStorage.getItem('betcalc_bets') || '[]');
  let selectedResult = 'win';
  let editResult = 'win';
  let editId = null;
  let currentFilter = 'all';

  // Fix iOS: acepta coma o punto como decimal
  function parseNum(val) {
    return parseFloat(String(val).replace(',', '.'));
  }

  // Guardar en localStorage
  function save() {
    localStorage.setItem('betcalc_bets', JSON.stringify(bets));
  }

  // Preview en tiempo real
  document.getElementById('f-stake').addEventListener('input', updatePreview);
  document.getElementById('f-odds').addEventListener('input', updatePreview);

  function updatePreview() {
    const stake = parseNum(document.getElementById('f-stake').value) || 0;
    const odds  = parseNum(document.getElementById('f-odds').value) || 1;
    const ret = stake * odds;
    document.getElementById('f-preview').textContent = '$' + ret.toLocaleString('es-AR', {minimumFractionDigits: 2, maximumFractionDigits: 2});
  }

  function selectResult(r) {
    selectedResult = r;
    document.getElementById('btn-win').className = 'btn-result' + (r==='win' ? ' selected-win' : '');
    document.getElementById('btn-loss').className = 'btn-result' + (r==='loss' ? ' selected-loss' : '');
    document.getElementById('btn-pending').className = 'btn-result' + (r==='pending' ? ' selected-pending' : '');
  }

  function addBet() {
    const stake = parseNum(document.getElementById('f-stake').value);
    const odds  = parseNum(document.getElementById('f-odds').value);
    const desc  = document.getElementById('f-desc').value.trim();

    if (!stake || stake <= 0 || !odds || odds < 1) {
      shake(document.querySelector('.form-wrap'));
      return;
    }

    const profit = selectedResult === 'win'
      ? (stake * odds) - stake
      : selectedResult === 'loss'
      ? -stake
      : 0;

    bets.unshift({
      id: Date.now(),
      desc: desc || 'Apuesta',
      stake,
      odds,
      result: selectedResult,
      profit,
      date: new Date().toLocaleDateString('es-AR', {day:'2-digit', month:'2-digit'})
    });

    save();
    render();

    // Reset form
    document.getElementById('f-stake').value = '';
    document.getElementById('f-odds').value = '';
    document.getElementById('f-desc').value = '';
    document.getElementById('f-preview').textContent = '$0.00';
    selectResult('win');
  }

  function shake(el) {
    el.style.animation = 'none';
    el.offsetHeight;
    el.style.animation = 'shake 0.3s ease';
    setTimeout(() => el.style.animation = '', 300);
  }

  function deleteBet(id) {
    bets = bets.filter(b => b.id !== id);
    save();
    render();
  }

  function openEdit(id) {
    const b = bets.find(x => x.id === id);
    if (!b) return;
    editId = id;
    editResult = b.result;
    document.getElementById('e-desc').value = b.desc;
    document.getElementById('e-stake').value = b.stake;
    document.getElementById('e-odds').value = b.odds;
    selectEditResult(b.result);
    document.getElementById('modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    editId = null;
  }

  document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  function selectEditResult(r) {
    editResult = r;
    document.getElementById('e-btn-win').className = 'btn-result' + (r==='win' ? ' selected-win' : '');
    document.getElementById('e-btn-loss').className = 'btn-result' + (r==='loss' ? ' selected-loss' : '');
    document.getElementById('e-btn-pending').className = 'btn-result' + (r==='pending' ? ' selected-pending' : '');
  }

  function saveEdit() {
    const stake = parseNum(document.getElementById('e-stake').value);
    const odds  = parseNum(document.getElementById('e-odds').value);
    const desc  = document.getElementById('e-desc').value.trim();
    if (!stake || stake <= 0 || !odds || odds < 1) return;

    const profit = editResult === 'win'
      ? (stake * odds) - stake
      : editResult === 'loss'
      ? -stake
      : 0;

    bets = bets.map(b => b.id === editId
      ? { ...b, desc: desc || 'Apuesta', stake, odds, result: editResult, profit }
      : b
    );

    save();
    closeModal();
    render();
  }

  function setFilter(f, el) {
    currentFilter = f;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    render();
  }

  function fmt(n) {
    return n.toLocaleString('es-AR', {minimumFractionDigits: 2, maximumFractionDigits: 2});
  }

  function render() {
    // Stats
    const total   = bets.length;
    const won     = bets.filter(b => b.result === 'win').length;
    const lost    = bets.filter(b => b.result === 'loss').length;
    const pnl     = bets.reduce((s, b) => s + b.profit, 0);

    document.getElementById('s-total').textContent = total;
    document.getElementById('s-won').textContent   = won;
    document.getElementById('s-lost').textContent  = lost;

    const pnlEl = document.getElementById('s-pnl');
    pnlEl.textContent = (pnl >= 0 ? '+$' : '-$') + fmt(Math.abs(pnl));
    pnlEl.className = 'stat-val ' + (pnl > 0 ? 'green' : pnl < 0 ? 'red' : '');

    // Lista
    const filtered = currentFilter === 'all' ? bets : bets.filter(b => b.result === currentFilter);
    const list = document.getElementById('bets-list');

    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty">Sin apuestas aún</div>';
      return;
    }

    list.innerHTML = filtered.map(b => {
      const dotClass = b.result === 'win' ? 'dot-win' : b.result === 'loss' ? 'dot-loss' : 'dot-pending';
      const amtColor = b.result === 'win' ? 'green' : b.result === 'loss' ? 'red' : 'yellow';
      const sign     = b.result === 'win' ? '+' : b.result === 'loss' ? '-' : '~';
      const amount   = b.result === 'pending' ? fmt(b.stake * b.odds) : fmt(Math.abs(b.profit));
      const retorno  = fmt(b.stake * b.odds);

      return `
        <div class="bet-card">
          <div class="bet-dot ${dotClass}"></div>
          <div class="bet-info">
            <div class="bet-desc">${b.desc}</div>
            <div class="bet-meta">$${fmt(b.stake)} × ${b.odds} &nbsp;·&nbsp; ret. $${retorno} &nbsp;·&nbsp; ${b.date}</div>
          </div>
          <div class="bet-amount ${amtColor}">${sign}$${amount}</div>
          <div class="bet-actions">
            <button class="btn-icon" onclick="openEdit(${b.id})" title="Editar">✏️</button>
            <button class="btn-icon del" onclick="deleteBet(${b.id})" title="Eliminar">🗑</button>
          </div>
        </div>
      `;
    }).join('');
  }

  // Shake animation
  const style = document.createElement('style');
  style.textContent = `
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
  `;
  document.head.appendChild(style);

  render();
</script>
</body>
</html>
